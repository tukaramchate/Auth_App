server:
  port: ${PORT:8083}

#Database Connectivity
spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
  mail:
    host: ${MAIL_HOST:}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: ${MAIL_SMTP_AUTH:true}
          starttls:
            enable: ${MAIL_SMTP_STARTTLS_ENABLE:true}
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: false
  security:
    #    oauth2 configurations
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
                - email
                - profile
                - openid

          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - user:email
              - read:user

          linkedin:
            client-id: ${LINKEDIN_CLIENT_ID}
            client-secret: ${LINKEDIN_CLIENT_SECRET}
            client-name: LinkedIn
            client-authentication-method: client_secret_post
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/{registrationId}"
            scope:
              - openid
              - profile
              - email
            provider: linkedin

        provider:
          linkedin:
            authorization-uri: https://www.linkedin.com/oauth/v2/authorization
            token-uri: https://www.linkedin.com/oauth/v2/accessToken
            user-info-uri: https://api.linkedin.com/v2/userinfo
            user-name-attribute: sub

# jpa and hibernate configurations

logging:
  level:
    org.springframework.security: INFO


security:
  jwt:
    secret: ${JWT_SECRET}
    issuer: ${JWT_ISSUER:api.validation.com}
    access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600}
    refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400}
    refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
    cookie-secure: ${JWT_COOKIE_SECURE:true}
    cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
    cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}
    cookie-domain: ${JWT_COOKIE_DOMAIN:localhost}



app:
  cors:
    front-end-url: ${FRONTEND_URL:http://localhost:5173}
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      first:
        email: ${BOOTSTRAP_ADMIN1_EMAIL:admin1@auth-app.local}
        password: ${BOOTSTRAP_ADMIN1_PASSWORD:}
        name: ${BOOTSTRAP_ADMIN1_NAME:Primary Admin}
      second:
        email: ${BOOTSTRAP_ADMIN2_EMAIL:admin2@auth-app.local}
        password: ${BOOTSTRAP_ADMIN2_PASSWORD:}
        name: ${BOOTSTRAP_ADMIN2_NAME:Secondary Admin}
  auth:
    email:
      from: ${AUTH_EMAIL_FROM:no-reply@auth-app.local}
    password-reset:
      enabled: ${AUTH_PASSWORD_RESET_ENABLED:true}
      token-ttl-seconds: ${AUTH_PASSWORD_RESET_TTL_SECONDS:1800}
    verification:
      enabled: ${AUTH_EMAIL_VERIFICATION_ENABLED:true}
      token-ttl-seconds: ${AUTH_EMAIL_VERIFICATION_TTL_SECONDS:86400}
    frontend:
      success-redirect: ${FRONTEND_SUCCESS_URL:http://localhost:5173/oauth/success}
      failure-redirect: ${FRONTEND_FAILURE_URL:http://localhost:5173/oauth/failure}
      verify-email-url: ${FRONTEND_VERIFY_EMAIL_URL:http://localhost:5173/verify-email}
      reset-password-url: ${FRONTEND_RESET_PASSWORD_URL:http://localhost:5173/reset-password}
  rate-limit:
    enabled: ${APP_RATE_LIMIT_ENABLED:true}
    rules:
      - name: login
        path-pattern: /api/v1/auth/login
        method: POST
        limit: ${APP_RATE_LIMIT_LOGIN_LIMIT:5}
        window-seconds: ${APP_RATE_LIMIT_LOGIN_WINDOW_SECONDS:60}
      - name: register
        path-pattern: /api/v1/auth/register
        method: POST
        limit: ${APP_RATE_LIMIT_REGISTER_LIMIT:10}
        window-seconds: ${APP_RATE_LIMIT_REGISTER_WINDOW_SECONDS:300}
      - name: forgot-password
        path-pattern: /api/v1/auth/forgot-password
        method: POST
        limit: ${APP_RATE_LIMIT_FORGOT_PASSWORD_LIMIT:5}
        window-seconds: ${APP_RATE_LIMIT_FORGOT_PASSWORD_WINDOW_SECONDS:300}
      - name: reset-password
        path-pattern: /api/v1/auth/reset-password
        method: POST
        limit: ${APP_RATE_LIMIT_RESET_PASSWORD_LIMIT:10}
        window-seconds: ${APP_RATE_LIMIT_RESET_PASSWORD_WINDOW_SECONDS:300}
      - name: refresh-token
        path-pattern: /api/v1/auth/refresh
        method: POST
        limit: ${APP_RATE_LIMIT_REFRESH_LIMIT:30}
        window-seconds: ${APP_RATE_LIMIT_REFRESH_WINDOW_SECONDS:60}